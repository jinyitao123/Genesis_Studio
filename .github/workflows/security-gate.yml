name: security-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t genesis-backend-scan -f backend/Dockerfile .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: genesis-backend-scan
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          exit-code: "1"

  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install wait helper dependency
        run: pip install requests
      - name: Start query API dependencies
        run: docker compose up -d --build query-api neo4j redis
      - name: Wait for query API
        run: python -c "import time,requests; [time.sleep(1) for _ in range(15) if requests.get('http://localhost:5000/api/health', timeout=5).status_code != 200]"
      - name: ZAP baseline scan
        run: |
          docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:5000/api/health -I
