name: dr-drill

on:
  workflow_dispatch:

jobs:
  drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install drill dependency
        run: pip install requests
      - name: Run DR drill script
        run: bash dr/drill_scripts/run_drill.sh
