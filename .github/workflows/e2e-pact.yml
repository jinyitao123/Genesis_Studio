name: e2e-pact

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-and-pact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run e2e suite
        run: python -m pytest tests/e2e -x
      - name: Run pact compatibility suite
        run: python -m pytest tests/pact -x
