apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: genesis-studio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.com/genesis-studio.git
    targetRevision: main
    path: helm/genesis-studio
  destination:
    server: https://kubernetes.default.svc
    namespace: genesis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
