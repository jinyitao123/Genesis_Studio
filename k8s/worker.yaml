apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: genesis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: genesis_studio-worker:latest
          command: ["celery", "-A", "backend.workers.celery_app.celery_app", "worker", "--loglevel=info"]
          env:
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/1
