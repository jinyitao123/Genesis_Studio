apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: genesis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
    spec:
      containers:
        - name: query-api
          image: genesis_studio-query-api:latest
          command: ["python", "run.py"]
          ports:
            - containerPort: 5000
          env:
            - name: ENV_FILE
              value: /app/.env.example
            - name: NEO4J_URI
              value: bolt://neo4j:7687
---
apiVersion: v1
kind: Service
metadata:
  name: query-api
  namespace: genesis
spec:
  selector:
    app: query-api
  ports:
    - name: http
      port: 5000
      targetPort: 5000
