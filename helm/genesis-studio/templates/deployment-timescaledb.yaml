apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: genesis
  labels:
    app: timescaledb
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: timescaledb
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      serviceAccountName: timescaledb
      containers:
      - name: timescaledb
        image: timescale/timescaledb:2.11.2-pg15
        ports:
        - containerPort: 5432
          protocol: TCP
          name: postgres
        - containerPort: 9187
          protocol: TCP
          name: metrics
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: genesis-secrets
              key: timescaledb-password
        - name: POSTGRES_DB
          value: telemetry
        - name: TIMESCALEDB_TELEMETRY
          value: "off"
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 8Gi
        volumeMounts:
        - name: timescaledb-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
              - pg_isready
              - -U
              - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
              - pg_isready
              - -U
              - postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      - name: postgres-exporter
        image: wrouesnel/postgres_exporter:v0.15.0
        ports:
        - containerPort: 9187
          protocol: TCP
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@localhost:5432/telemetry?sslmode=disable"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: timescaledb-data
        persistentVolumeClaim:
          claimName: timescaledb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: genesis
  labels:
    app: timescaledb
spec:
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app: timescaledb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: genesis
  labels:
    app: timescaledb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
