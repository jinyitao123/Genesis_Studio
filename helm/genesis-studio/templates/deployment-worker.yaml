apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: genesis
  labels:
    app: worker
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        version: v1
      annotations:
        istio.io/rev: default
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "genesis-app"
        vault.hashicorp.com/agent-cache-enable: "true"
        vault.hashicorp.com/tls-skip-verify: "false"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: genesis-app
      containers:
      - name: worker
        image: genesis_studio-worker:latest
        args:
          - celery
          - -A
          - backend.workers.celery_app
          - worker
          - --loglevel=info
          - --concurrency=4
        env:
        - name: VAULT_ADDR
          value: https://vault.vault.svc.cluster.local:8200
        - name: VAULT_CACERT
          value: /vault/tls/ca.crt
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: genesis-secrets
              key: celery-broker-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: genesis-secrets
              key: database-url
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        - name: vault-tls
          mountPath: /vault/tls
          readOnly: true
      volumes:
      - name: vault-secrets
        emptyDir:
          medium: Memory
      - name: vault-tls
        secret:
          secretName: vault-tls-cert
