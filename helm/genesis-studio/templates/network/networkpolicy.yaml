apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: genesis-deny-all
  namespace: genesis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: genesis-allow-istio
  namespace: genesis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 50051
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 15012
    - protocol: TCP
      port: 15021
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: genesis-allow-query-api
  namespace: genesis
spec:
  podSelector:
    matchLabels:
      app: query-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: genesis-gateway
    ports:
    - protocol: TCP
      port: 5000
  - from:
    - podSelector:
        matchLabels:
          app: command-api
    ports:
    - protocol: TCP
      port: 5000
---
