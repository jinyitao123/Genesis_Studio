apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: genesis
  labels:
    app: elasticsearch
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: elasticsearch
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: elasticsearch
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9114"
    spec:
      serviceAccountName: elasticsearch
      initContainers:
      - name: init-sysctl
        image: busybox:1.36
        command:
          - sysctl
          - -w
          - vm.max_map_count=262144
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
        ports:
        - containerPort: 9200
          protocol: TCP
          name: http
        - containerPort: 9300
          protocol: TCP
          name: transport
        - containerPort: 9114
          protocol: TCP
          name: metrics
        env:
        - name: discovery.type
          value: single-node
        - name: node.name
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: cluster.name
          value: genesis-elasticsearch
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: genesis-secrets
              key: elastic-password
        - name: xpack.security.enabled
          value: "true"
        - name: xpack.security.http.ssl.enabled
          value: "false"
        - name: xpack.security.transport.ssl.enabled
          value: "false"
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 8Gi
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data
        livenessProbe:
          httpGet:
            path: /_cluster/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /_cluster/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      - name: elasticsearch-exporter
        image: justwatch/elasticsearch_exporter:1.3.0
        ports:
        - containerPort: 9114
          protocol: TCP
          name: metrics
        env:
        - name: ES_URI
          value: http://localhost:9200
        - name: ES_ALL_SHARDS
          value: "true"
        - name: ES_INSECURE_SKIP_VERIFY
          value: "true"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: elasticsearch-data
        persistentVolumeClaim:
          claimName: elasticsearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: genesis
  labels:
    app: elasticsearch
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9114"
spec:
  ports:
  - port: 9200
    targetPort: 9200
    protocol: TCP
    name: http
  - port: 9300
    targetPort: 9300
    protocol: TCP
    name: transport
  - port: 9114
    targetPort: 9114
    protocol: TCP
    name: metrics
  selector:
    app: elasticsearch
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: genesis
  labels:
    app: elasticsearch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
