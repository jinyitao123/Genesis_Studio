apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: genesis-gateway
  namespace: genesis
  labels:
    app: genesis-gateway
    version: v1
spec:
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "*"
    tls:
      mode: SIMPLE
      credentialName: genesis-tls-cert
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
    tls:
      httpsRedirect: true
  - port:
      number: 50051
      name: grpc
      protocol: GRPC
    hosts:
    - "*"
