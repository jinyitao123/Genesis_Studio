apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@genesis-studio.io
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          class: istio
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: cert-manager
spec:
  acme:
    server: https://acme-staging.api.letsencrypt.org/directory
    email: admin@genesis-studio.io
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - http01:
        ingress:
          class: istio
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: genesis-studio-tls
  namespace: istio-system
spec:
  secretName: genesis-studio-tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: genesis-studio.io
  dnsNames:
  - genesis-studio.io
  - "*.genesis-studio.io"
  - staging.genesis-studio.io
  - "*.staging.genesis-studio.io"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls-cert
  namespace: vault
spec:
  secretName: vault-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: vault.genesis-studio.io
  dnsNames:
  - vault.genesis-studio.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grpc-tls-cert
  namespace: genesis
spec:
  secretName: grpc-tls-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: grpc.genesis-studio.io
  dnsNames:
  - grpc.genesis-studio.io
