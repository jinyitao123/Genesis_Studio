# Genesis Studio Helm Chart - Staging Environment Values
# This file contains environment-specific configuration for staging deployments

global:
  environment: staging
  domain: staging.genesis-studio.io

# Application Services Configuration
queryApi:
  enabled: true
  replicas: 2
  image:
    repository: genesis_studio/query-api
    tag: staging-latest
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

commandApi:
  enabled: true
  replicas: 2
  image:
    repository: genesis_studio/command-api
    tag: staging-latest
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

worker:
  enabled: true
  replicas: 1
  image:
    repository: genesis_studio/worker
    tag: staging-latest
  concurrency: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

grpcApi:
  enabled: true
  replicas: 1
  image:
    repository: genesis_studio/grpc-api
    tag: staging-latest
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Data Stores - Reduced replicas for staging
neo4j:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi
  persistence:
    size: 50Gi

redis:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    size: 5Gi

postgres:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    size: 20Gi

elasticsearch:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 4Gi
  persistence:
    size: 20Gi

timescaledb:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 4Gi
  persistence:
    size: 50Gi

# Istio Configuration - Staging
istio:
  enabled: true
  gateway:
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  sidecar:
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi

# Vault Configuration - Staging
vault:
  enabled: true
  address: https://vault.staging.genesis-studio.io:8200
  agent:
    cacheSize: 500
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Network Policies - Staging (slightly relaxed for debugging)
networkPolicies:
  enabled: true
  ingress:
    enabled: true
    cidr: 0.0.0.0/0

# Observability - Staging
observability:
  prometheus:
    enabled: true
    namespace: monitoring
    retention: 7d
    storageSize: 50Gi
  grafana:
    enabled: true
    persistence:
      size: 10Gi

# Resource Overrides
resources:
  limits:
    cpu: 4000m
    memory: 16Gi

# Image Pull Secrets
imagePullSecrets:
  - name: docker-registry-secret

# Node Selectors
nodeSelector:
  node-type: staging

# Affinity Rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app: genesis-studio
        topologyKey: kubernetes.io/hostname

# Tolerations
tolerations:
  - key: "staging"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
